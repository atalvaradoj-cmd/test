<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Ti ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
overflow:hidden;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
animation:fade 1s ease;
}

h1{
font-size:42px;
margin-bottom:20px;
}

p{
font-size:20px;
margin-bottom:30px;
line-height:1.6;
}

button{
padding:15px 35px;
border:none;
border-radius:40px;
background:white;
color:#ff4d6d;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#respuesta{
display:none;
margin-top:25px;
font-size:28px;
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>
<body>

<div class="card">

<h1>Hola ❤️</h1>

<p>
Hay algo que quiero preguntarte...
</p>

<button onclick="mostrar()">
Haz clic aquí
</button>

<div id="respuesta">

<p>
Desde que llegaste a mi vida todo ha sido mucho más bonito.
</p>

<h2>
¿Quieres ser mi novia? 💖
</h2>

</div>

</div>

<script>

function mostrar(){

document.querySelector("button").style.display="none";

document.getElementById("respuesta").style.display="block";

}

</script>

</body>
</html>
